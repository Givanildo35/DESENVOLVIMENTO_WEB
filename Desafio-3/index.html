<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonte Poppins -->
    <link href="assets/fonts/Poppins-ExtraBold.ttf" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />

    <title>Caulculadora de Idade</title>
  </head>

  <body>
    <main class="container">
      <form class="form">
        <div class="inputs">
          <div class="input-group">
            <label>DIA</label>
            <input type="number" id="day" placeholder="DD" min="1" max="31" />

            <small class="error" id="dayError"></small>
          </div>

          <div class="input-group">
            <label>MES</label>
            <input type="number" id="month" placeholder="MM" min="1" max="12"/>

            <small class="error" id="monthError"></small>
          </div>

          <div class="input-group">
            <label>ANO</label>
            <input type="number" id="year" placeholder="YYYY" min="1" max="2026" />

            <small class="error" id="yearError"></small>
          </div>
        </div>

        <div class="divider">
          <!-- Botão com ícone -->
          <button type="button" onclick="calculateAge()">
            <img src="./assets/images/icon-arrow.svg" alt="botão enter" />
          </button>
        </div>
      </form>

      <section class="result">
        <h1><span id="years">--</span> anos</h1>
        <h1><span id="months">--</span> meses</h1>
        <h1><span id="days">--</span> dias</h1>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

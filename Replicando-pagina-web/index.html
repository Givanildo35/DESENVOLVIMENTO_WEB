<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Splitter</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1 class="logo">SPLI<br>TTER</h1>
</header>

<main class="container">

    <section class="calculator">

        <div class="form-group">
            <label for="bill" class="icon">Conta</label>
            <div class="input-wrapper">
                <img src="assets/icon-dollar.svg" alt="" class="icon"/>
                <input id="bill" type="number" placeholder="0">
            </div>
        </div>

    <div class="form-group">

        <label>Selecione a  %</label>

        <div class="tip-buttons">

            <button data-tip="5">5%</button>
            <button data-tip="10">10%</button>
            <button data-tip="15">15%</button>
            <button data-tip="25">25%</button>
            <button data-tip="50">50%</button>

            <input id="customTip" type="number" placeholder="Custom">

        </div>
    </div>

    <div class="form-group">

    <label for="people">Numero de Pessoas</label>
    <input id="people" type="number" placeholder="0">

    <p class="error" id="error">Nao pode ser zero</p>

    </div>

    </section>

    <section class="result">

    <div class="result-line">

    <div>
    <p>Tip Amount</p>
    <span>/ pessoa</span>
    </div>

    <h2 id="tipAmount">R$0.00</h2>

    </div>

    <div class="result-line">

    <div>
    <p>Total</p>
    <span>/ por pessoa</span>
    </div>

    <h2 id="totalAmount">R$0.00</h2>

    </div>

    <button id="reset">RESET</button>

    </section>

</main>

<script src="script.js"></script>

</body>
</html>

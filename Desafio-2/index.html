<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Desafio_2</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <section class="content">
        <img src="./images/logo.svg" alt="logo base aparel" class="logo"/>

        <h1>
          <span>WE'RE</span>
          COMING SOON
        </h1>

        <p>
          Hello fellow shoppers! We're currently building our new fashion store.
          Add your email below to stay up-to-date with announcements and our
          launch deals.
        </p>

        <form id="form">
          <div class="input-group">
            <input
              type="email"
              placeholder="Email Address"
              id="email"
              aria-label="Email Address"
              required
            />

            <button type="submit">→</button>
          </div>

          <small class="error" id="error"> Por favor insira um e-mail valido! </small>
        </form>
      </section>

      <section class="hero">
        <img src="./images/hero-desktop.jpg" />
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
